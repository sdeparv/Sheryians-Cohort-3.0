<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRTO Winter Armor UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Josefin+Slab:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap" rel="stylesheet">

/>

<body>
    <section class="main">
        <div class="header">
            <div class="logo">ASTRO<span class="dot">.</span></div>

                <h5>PRODUCTS</h5>
                <h5>CATEGORY</h5>
                <h5>ABOUT US</h5>
                <h5>CONTACT</h5>
            </div>
            <div class="icons">
                <i class="ri-search-line"></i>
                <i class="ri-shopping-cart-line"></i>
                <i class="ri-user-fill"></i>
            </div>
        </div>
        <div class="uline"></div>

        <div class="hero">
            <h4 class="s-head">NEW</h4>
            <h1 class="m-head">ASTRO</h1>
            <h1 class="m-head">WINTER</h1>
            <h1 class="m-head">ARMOR<span style="color: rgb(242, 142, 65);">II</span></h1>
